<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mr. Darsh Family Salon — Book a Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --gold:#c9a84c;
  --dark:#0a0806;
  --text:#e8e0d0;
  --muted:#9a8c78;
}
body{
  background:var(--dark);
  color:var(--text);
  font-family:Montserrat;
  margin:0;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}
.nav-logo{
  font-family:'Playfair Display';
  color:var(--gold);
  letter-spacing:2px;
}
.nav-links{
  display:flex;
  gap:20px;
  list-style:none;
}
.nav-links a{
  color:var(--muted);
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px;
}
.hero-title{
  font-size:60px;
  font-family:'Playfair Display';
}
.hero-title em{
  color:var(--gold);
}

/* BUTTON */
.btn{
  background:var(--gold);
  padding:15px 30px;
  display:inline-block;
  color:black;
  text-decoration:none;
  margin-top:20px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  border-top:1px solid #333;
}
.footer-logo{
  color:var(--gold);
  font-family:'Playfair Display';
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Mr. Darsh Family Salon</div>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#booking">Book</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title">
    Mr. <em>Darsh</em><br>Family Salon
  </h1>
  <p>Style · Care · Elegance</p>
  <a href="#booking" class="btn">Book Now</a>
</section>

<!-- SERVICES -->
<section id="services" class="hero">
  <h2>Our Services</h2>
  <p>Haircut · Colour · Keratin · Spa · Beard</p>
</section>

<!-- BOOKING -->
<section id="booking" class="hero">
  <h2>Book Your Slot</h2>

  <input placeholder="Your Name" style="padding:10px; width:250px;"><br><br>
  <input placeholder="Phone" style="padding:10px; width:250px;"><br><br>

  <select style="padding:10px; width:250px;">
    <option>Select Service</option>
    <option>Haircut</option>
    <option>Keratin</option>
    <option>Hair Spa</option>
  </select><br><br>

  <a class="btn">Confirm Booking</a>
</section>

<!-- FOOTER -->
<footer id="contact">
  <div class="footer-logo">Mr. Darsh Family Salon</div>
  <p>Nashik, Maharashtra</p>
  <p>+91 96998 68405</p>
</footer>

</body>
</html>
